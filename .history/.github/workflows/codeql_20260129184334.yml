name: "🔬 CodeQL Advanced Security"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run CodeQL analysis every day at 2 AM UTC
    - cron: "0 2 * * *"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 360

    strategy:
      fail-fast: false
      matrix:
        language: ["python"]
        # Add more languages if needed: javascript, typescript, etc.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # Initialize CodeQL tools for scanning
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Custom queries for additional security checks
          queries: +security-and-quality

          # Enable extended query suite
          config: |
            queries:
              - uses: security-extended
              - uses: security-and-quality

            # Custom paths to scan
            paths:
              - src

            # Paths to ignore
            paths-ignore:
              - tests
              - docs
              - scripts
              - htmlcov
              - '**/__pycache__'

      # Autobuild attempts to build any compiled languages
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      # Perform CodeQL Analysis
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: true
          output: sarif-results

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: sarif-results/${{ matrix.language }}.sarif

      - name: Check for critical vulnerabilities
        if: always()
        run: |
          echo "🔍 Checking for critical security issues..."
          if [ -f "sarif-results/${{ matrix.language }}.sarif" ]; then
            CRITICAL_COUNT=$(jq '[.runs[].results[] | select(.level == "error")] | length' sarif-results/${{ matrix.language }}.sarif)
            echo "Critical issues found: $CRITICAL_COUNT"
            
            if [ "$CRITICAL_COUNT" -gt 0 ]; then
              echo "⚠️  Critical security issues detected!"
              echo "Please review the Security tab for details."
            else
              echo "✅ No critical security issues found"
            fi
          fi
