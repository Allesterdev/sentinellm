# ============================================================
# IMPORTANT NOTES:
# ============================================================
#
# Network flow:
#   You ↔ OpenClaw Gateway (:18789) → SentineLLM Proxy (:8080) → LLM Provider
#
# - SentineLLM MUST be running BEFORE starting OpenClaw
# - Start order:
#   1. python sentinellm.py proxy            (listens on :8080)
#   2. openclaw                              (gateway on :18789, LLM via :8080)
#
# - DO NOT use the same port for both services!
# - To also validate LLM RESPONSES (DLP), set env:
#     SENTINELLM_VALIDATE_OUTPUT=true  (enabled by default)
#
# Troubleshooting:
#   curl http://localhost:8080/health
#   → Should respond with {"status":"healthy","service":"sentinellm-proxy"}
