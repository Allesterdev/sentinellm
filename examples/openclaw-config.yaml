# OpenClaw + SentineLLM Integration Configuration
#
# This file shows how to route OpenClaw's LLM traffic through
# SentineLLM Proxy for security auditing (prompt injection, secret
# leakage / DLP, entropy analysis).
#
# How to use:
#   1. Start SentineLLM proxy:
#        cd ~/Proyectos/SentineLLM
#        source .venv/bin/activate
#        python sentinellm.py proxy --target-url https://api.openai.com
#
#   2. Merge this config into your OpenClaw config.json5:
#        ~/.config/openclaw/config.json5
#      or pass it with:
#        openclaw --config path/to/config.json5
#
#   3. Start OpenClaw normally — all LLM traffic now passes through SentineLLM.
#
# ============================================================
# OPTION 1: Anthropic (Claude) via SentineLLM Proxy
# ============================================================
# Config to paste in your OpenClaw config.json5:
#
# {
#   env: { ANTHROPIC_API_KEY: "sk-ant-..." },  # pragma: allowlist secret
#   agents: {
#     defaults: {
#       model: { primary: "sentinellm-anthropic/claude-sonnet-4-5" },
#       models: {
#         "sentinellm-anthropic/claude-sonnet-4-5": { alias: "Claude (audited)" },
#       },
#     },
#   },
#   models: {
#     mode: "merge",
#     providers: {
#       "sentinellm-anthropic": {
#         baseUrl: "http://localhost:8080/v1",
#         apiKey: "${ANTHROPIC_API_KEY}",
#         api: "openai-completions",
#         headers: { "X-Target-URL": "https://api.anthropic.com" },
#         models: [
#           {
#             id: "claude-sonnet-4-5",
#             name: "Claude Sonnet 4.5 (via SentineLLM)",
#             reasoning: false,
#             input: ["text", "image"],
#             cost: { input: 3, output: 15, cacheRead: 0.3, cacheWrite: 3.75 },
#             contextWindow: 200000,
#             maxTokens: 8192,
#           },
#         ],
#       },
#     },
#   },
# }
