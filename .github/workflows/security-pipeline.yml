name: 🛡️ Security & Quality Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run weekly security scans (every Monday at 00:00 UTC)
    - cron: "0 0 * * 1"

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # SAST - Static Application Security Testing
  # ═══════════════════════════════════════════════════════════════════
  bandit-sast:
    name: 🔍 Bandit SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit security scan
        run: |
          bandit -r src/ -f json -o bandit-report.json
          bandit -r src/ -f txt
        continue-on-error: true

      - name: Upload Bandit results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: bandit-results
          path: bandit-report.json

  # ═══════════════════════════════════════════════════════════════════
  # Secret Scanning
  # ═══════════════════════════════════════════════════════════════════
  detect-secrets:
    name: 🔐 Detect Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Run detect-secrets scan
        run: |
          detect-secrets scan --all-files --force-use-all-plugins \
            --exclude-files '\.git/.*' \
            --exclude-files '\.venv/.*' \
            --exclude-files '\.history/.*' \
            --exclude-files 'htmlcov/.*' \
            --baseline .secrets.baseline

      - name: Check for secrets
        run: |
          echo "🔍 Scanning for secrets with baseline verification..."

          # detect-secrets with baseline exits 1 if new secrets found
          if detect-secrets scan --all-files --force-use-all-plugins \
            --exclude-files '\.git/.*' \
            --exclude-files '\.venv/.*' \
            --exclude-files '\.history/.*' \
            --exclude-files 'htmlcov/.*' \
            --baseline .secrets.baseline 2>&1 | tee scan-output.txt | grep -q "Potential secrets"; then

            echo ""
            echo "⚠️ NEW SECRETS DETECTED!"
            echo "Secrets found that are NOT in the audited baseline."
            echo ""
            cat scan-output.txt
            echo ""
            echo "If these are false positives:"
            echo "1. Run locally: detect-secrets scan > .secrets.baseline"
            echo "2. Audit: detect-secrets audit .secrets.baseline"
            echo "3. Mark as false positive and commit baseline"
            echo ""
            echo "⚠️ NEVER commit real credentials!"
            exit 1
          fi

          echo "✅ No new secrets detected - baseline is up to date"
  # Dependency Vulnerability Scanning
  # ═══════════════════════════════════════════════════════════════════
  safety-check:
    name: 📦 Safety - Dependency Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install safety
          pip install -r requirements.txt

      - name: Run Safety check
        run: |
          safety check --json --output safety-report.json
          safety check
        continue-on-error: true

      - name: Upload Safety results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: safety-results
          path: safety-report.json

  trivy-scan:
    name: 🐳 Trivy - Container & Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner (Filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: "trivy-results.sarif"

      - name: Run Trivy scan (human-readable)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          severity: "CRITICAL,HIGH"

  # ═══════════════════════════════════════════════════════════════════
  # Code Quality Checks
  # ═══════════════════════════════════════════════════════════════════
  code-quality:
    name: ✨ Code Quality (Ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install ruff mypy
          pip install -r requirements.txt

      - name: Run Ruff linter
        run: |
          echo "🔍 Running Ruff linter..."
          ruff check src/ tests/ --output-format=github
        continue-on-error: true

      - name: Run Ruff formatter check
        run: |
          echo "🎨 Checking code formatting..."
          ruff format --check src/ tests/
        continue-on-error: true

      - name: Run mypy type checker
        run: |
          echo "🔬 Running mypy type checker..."
          mypy src/ --ignore-missing-imports
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════════
  # Unit Tests with Coverage
  # ═══════════════════════════════════════════════════════════════════
  tests:
    name: 🧪 Unit Tests & Coverage
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: matrix.python-version == '3.10'
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-sentinellm
          fail_ci_if_error: false

      - name: Check coverage threshold
        run: |
          COVERAGE=$(pytest --cov=src --cov-report=term-missing | grep TOTAL | awk '{print $4}' | sed 's/%//')
          echo "Current coverage: ${COVERAGE}%"
          # Focus on critical code coverage (detectors, validators, core logic)
          # CLI/wizard modules are tested manually
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "⚠️  Coverage is below 70% threshold"
            exit 1
          fi
          echo "✅ Coverage meets 70% threshold"

  # ═══════════════════════════════════════════════════════════════════
  # License Compliance Check
  # ═══════════════════════════════════════════════════════════════════
  license-check:
    name: ⚖️ License Compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install pip-licenses
        run: pip install pip-licenses

      - name: Install project dependencies
        run: pip install -r requirements.txt

      - name: Check licenses
        run: |
          echo "📋 Checking dependency licenses..."
          pip-licenses --format=markdown --output-file=licenses.md
          pip-licenses --summary

          # Fail if GPL licenses are found (stricter licensing)
          if pip-licenses | grep -i "GPL"; then
            echo "⚠️  GPL license detected - review required"
            exit 1
          fi
          echo "✅ All licenses are compatible"

  # ═══════════════════════════════════════════════════════════════════
  # Security Summary Report
  # ═══════════════════════════════════════════════════════════════════
  security-summary:
    name: 📊 Security Summary
    runs-on: ubuntu-latest
    needs:
      [
        bandit-sast,
        detect-secrets,
        safety-check,
        trivy-scan,
        code-quality,
        tests,
      ]
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate security summary
        run: |
          echo "# 🛡️ SentineLLM Security Pipeline Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📊 Job Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Security Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Bandit SAST | ${{ needs.bandit-sast.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔐 Secret Detection | ${{ needs.detect-secrets.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Safety Check | ${{ needs.safety-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Trivy Scan | ${{ needs.trivy-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ✨ Code Quality | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Unit Tests | ${{ needs.tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Pipeline Run**: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
