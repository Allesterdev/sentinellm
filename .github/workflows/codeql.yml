name: "🔬 CodeQL Advanced Security"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run CodeQL analysis every day at 2 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 360
    # Skip if repo is private without Advanced Security
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        language: ["python"]
        # Add more languages if needed: javascript, typescript, etc.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # Initialize CodeQL tools for scanning
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # Custom queries for additional security checks
          queries: +security-and-quality

          # Enable extended query suite
          config: |
            queries:
              - uses: security-extended
              - uses: security-and-quality

            # Custom paths to scan
            paths:
              - src

            # Paths to ignore
            paths-ignore:
              - tests
              - docs
              - scripts
              - htmlcov
              - '**/__pycache__'

      # Autobuild attempts to build any compiled languages
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      # Perform CodeQL Analysis
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        continue-on-error: true
        with:
          category: "/language:${{ matrix.language }}"
          upload: true
          output: sarif-results

      # Check results locally (no upload needed - analyze already uploads)
      - name: Check for critical vulnerabilities
        if: always()
        continue-on-error: true
        run: |
          echo "🔍 Checking for critical security issues..."
          if [ -f "sarif-results/${{ matrix.language }}.sarif" ]; then
            CRITICAL_COUNT=$(jq '[.runs[].results[] | select(.level == "error")] | length' sarif-results/${{ matrix.language }}.sarif 2>/dev/null || echo "0")
            echo "Critical issues found: $CRITICAL_COUNT"
            
            if [ "$CRITICAL_COUNT" -gt 0 ]; then
              echo "⚠️  Critical security issues detected!"
              echo "Review the workflow artifacts for details."
            else
              echo "✅ No critical security issues found"
            fi
          else
            echo "ℹ️  SARIF file not found - CodeQL may require GitHub Advanced Security"
            echo "For private repos: Enable Advanced Security in Settings"
            echo "Alternative: Make repository public for free code scanning"
          fi
          fi
