version: 2

updates:
  # ═══════════════════════════════════════════════════════════════════
  # Python dependencies (pip)
  # ═══════════════════════════════════════════════════════════════════
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 10
    reviewers:
      - "Allesterdev"
    assignees:
      - "Allesterdev"
    commit-message:
      prefix: "⬆️"
      include: "scope"

    # Security updates
    allow:
      - dependency-type: "all"

    # Group updates for better management
    groups:
      security-updates:
        patterns:
          - "bandit"
          - "safety"
          - "detect-secrets"
        update-types:
          - "minor"
          - "patch"

      testing-dependencies:
        patterns:
          - "pytest*"
          - "hypothesis"
        update-types:
          - "minor"
          - "patch"

      fastapi-ecosystem:
        patterns:
          - "fastapi"
          - "uvicorn"
          - "pydantic*"
          - "httpx"
        update-types:
          - "patch"

      development-tools:
        patterns:
          - "ruff"
          - "mypy"
          - "pre-commit"
        update-types:
          - "minor"
          - "patch"

    # Version strategy
    versioning-strategy: increase

    # Ignore specific updates if needed
    ignore:
      # Example: ignore major version updates for stable dependencies
      # - dependency-name: "fastapi"
      #   update-types: ["version-update:semver-major"]

      # Ignore deprecated packages
      - dependency-name: "*"
        versions: ["< 1.0.0"] # Avoid pre-1.0 versions for security

  # ═══════════════════════════════════════════════════════════════════
  # GitHub Actions
  # ═══════════════════════════════════════════════════════════════════
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    reviewers:
      - "Allesterdev"
    commit-message:
      prefix: "🔧"
      include: "scope"

    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # ═══════════════════════════════════════════════════════════════════
  # Docker (future)
  # ═══════════════════════════════════════════════════════════════════
