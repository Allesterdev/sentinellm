# Trivy secret scanner allow-list
#
# These rules suppress specific false-positive patterns that appear
# INTENTIONALLY in test fixtures, i18n demo prompts, and examples.
# They are crafted fake tokens used to demonstrate SentineLLM's own
# detection capabilities — they are NOT real credentials.
#
# Real GitHub PATs with different values are still fully detected.

enable-builtin-rules: true

allow-rules:
  - id: allow-fake-github-pat-sequential
    description: >
      Sequential digits+letters fake PAT used as a demonstration injection
      prompt in src/cli/i18n.py (EN + ES), tests/conftest.py, and
      tests/unit/test_detector.py. Value: ghp_1234567890abcdef...ABCD
    regex: "ghp_1234567890abcdefghijklmnopqrstuvwxyzABCD" # pragma: allowlist secret

  - id: allow-fake-github-pat-alternating
    description: >
      Alternating alpha/numeric fake PAT used in examples/demo.py to
      demonstrate secret detection output. Value: ghp_abcd1234efgh5678...
    regex: "ghp_abcd1234efgh5678ijkl9012mnop3456qrst7890" # pragma: allowlist secret
