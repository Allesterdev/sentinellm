# Trivy secret scanner allow-list
#
# All findings suppressed here are INTENTIONAL fake tokens used to
# demonstrate SentineLLM's own detection capabilities. They are crafted
# demo/test strings — NOT real credentials.
#
# Strategy: path-based rules are used instead of regex-based ones because
# Trivy's GitHub PAT rule may capture only a substring of the match (e.g.
# the 36-char group without the suffix), making exact-regex rules unreliable.
#
# Real secrets in src/, config/, and scripts/ are still fully scanned.

allow-rules:
  # ── i18n.py (EN + ES injection demo prompts) ────────────────────────────
  - id: allow-demo-tokens-i18n
    description: >
      src/cli/i18n.py contains intentional fake tokens (ghp_, AWS, JWT,
      credit card numbers) used as injection attack demonstration prompts.
      These strings are shown to the user to test the proxy — they are
      NOT real credentials.
    path: src/cli/i18n\.py

  # ── examples/ ────────────────────────────────────────────────────────────
  - id: allow-demo-tokens-examples
    description: >
      examples/ scripts use fake tokens to demonstrate how SentineLLM
      detects secrets. No real credentials are present.
    path: examples/

  # ── tests/ ───────────────────────────────────────────────────────────────
  - id: allow-test-fixtures
    description: >
      tests/ fixtures contain fake credentials intentionally crafted to
      verify that the detector and validator functions correctly identify
      each secret type. No real credentials are present.
    path: tests/
